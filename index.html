<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYLOAD: READY</title>
    <meta name="color-scheme" content="dark">
    <meta name="description" content="PAYLOAD READY — Systems nominal. Building what your 2027 roadmap missed.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --fg: #FFFFFF;
            --muted: #888888;
            --green: #00FF88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(1200px 800px at 50% 50%, rgba(255,255,255,0.02), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 1;
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-size: clamp(2.75rem, 10vw, 6.5rem);
            font-weight: 500;
            letter-spacing: 0.02em;
            line-height: 0.95;
            text-transform: uppercase;
            margin-bottom: 2.25rem;
            color: var(--fg);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: clamp(1rem, 2.4vw, 1.25rem);
            font-weight: 300;
            color: #D0D0D0;
            letter-spacing: 0.01em;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            position: relative;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.6);
            animation: pulse 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 136, 0.15);
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(0, 255, 136, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0);
            }
        }

        .tagline {
            margin-top: 3.5rem;
            font-size: clamp(0.875rem, 1.9vw, 1rem);
            font-weight: 300;
            color: var(--muted);
            letter-spacing: 0.02em;
            max-width: 42ch;
        }

        footer {
            position: relative;
            z-index: 1;
            width: 100%;
            text-align: center;
            padding: 0 1.5rem 2.5rem;
            font-size: clamp(0.78rem, 1.7vw, 0.875rem);
            color: #5A5A5A;
            font-weight: 300;
            letter-spacing: 0.01em;
            animation: fadeIn 1.8s ease-out;
        }

        footer a {
            color: #9A9A9A;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        footer a:hover {
            color: var(--fg);
            border-bottom-color: rgba(255, 255, 255, 0.45);
        }

        .launch-key {
            color: #CACACA;
            cursor: pointer;
            transition: color 0.2s ease;
            user-select: none;
            padding: 0 0.15em;
        }

        .launch-key:hover {
            color: var(--fg);
        }

        .launch-key.copied {
            color: var(--green);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            h1 {
                margin-bottom: 1.75rem;
                letter-spacing: 0.01em;
            }
            .tagline {
                margin-top: 2.75rem;
                padding: 0 1rem;
            }
            footer {
                padding-bottom: 2rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>PAYLOAD: READY</h1>
        
        <div class="status" aria-label="System status: nominal">
            <span class="dot" aria-hidden="true"></span>
            <span>Systems nominal.</span>
        </div>

        <p class="tagline">Building what your 2027 roadmap missed.</p>
    </main>

    <footer>
        DM <span class="launch-key" id="launch" role="button" tabindex="0" aria-label="Copy LAUNCH to clipboard">'LAUNCH'</span> on <a href="https://x.com/PayloadReady" target="_blank" rel="noopener noreferrer">@PayloadReady</a> for early access.
    </footer>

    <script>
        (function() {
            const launch = document.getElementById('launch');
            const original = "'LAUNCH'";
            const copied = "'COPIED'";
            
            async function copyLaunch() {
                try {
                    await navigator.clipboard.writeText('LAUNCH');
                    launch.textContent = copied;
                    launch.classList.add('copied');
                    setTimeout(() => {
                        launch.textContent = original;
                        launch.classList.remove('copied');
                    }, 1400);
                } catch (e) {
                    launch.textContent = original;
                }
            }

            launch.addEventListener('click', copyLaunch);
            launch.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    copyLaunch();
                }
            });
        })();
    </script>
</body>
</html>
